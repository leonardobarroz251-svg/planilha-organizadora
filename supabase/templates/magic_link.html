<!doctype html>
<html lang="pt-BR">
  <body style="margin:0;background:#f6f6f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f6f4;padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border:1px solid #e8e6e1;border-radius:14px;padding:40px 36px;">
            <tr>
              <td style="font-size:13px;letter-spacing:0.18em;text-transform:uppercase;color:#8a857c;padding-bottom:8px;">
                Cofre
              </td>
            </tr>
            <tr>
              <td style="font-size:22px;line-height:1.3;font-weight:500;color:#1a1a1a;padding-bottom:16px;">
                Seu código de acesso
              </td>
            </tr>
            <tr>
              <td style="font-size:14px;line-height:1.55;color:#5b574f;padding-bottom:28px;">
                Use o código abaixo para entrar. Ele expira em 1 hora e só funciona uma vez.
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:20px 0 28px;">
                <div style="display:inline-block;font-size:34px;letter-spacing:0.4em;font-weight:600;color:#1a1a1a;background:#f3f1ec;border:1px solid #e8e6e1;border-radius:10px;padding:18px 28px;font-variant-numeric:tabular-nums;">
                  {{ .Token }}
                </div>
              </td>
            </tr>
            <tr>
              <td style="font-size:12px;line-height:1.55;color:#8a857c;border-top:1px solid #f0eee9;padding-top:20px;">
                Se você não solicitou este código, pode ignorar este email — ninguém entrará na sua conta sem ele.
              </td>
            </tr>
          </table>
          <div style="margin-top:18px;font-size:11px;color:#a8a39a;">
            Cofre · planejamento financeiro
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
